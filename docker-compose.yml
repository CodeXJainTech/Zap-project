# version: "3.9"

services:

  #services like postgres kafka
  #remember no volumn is attached.
  #if error in postgres try: postgres:17-alpine
  postgres:
    image: postgres:latest
    container_name: zap-postgres
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    # No volume: data resets on docker compose down.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.1
    container_name: zap-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_CLUSTER_ID: "zap-dev-cluster-001"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 15

  kafka-init:
    image: apache/kafka:3.7.1
    container_name: zap-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/opt/kafka/bin/kafka-topics.sh",
      "--bootstrap-server", "kafka:9092",
      "--create", "--if-not-exists",
      "--topic", "zap-events",
      "--replication-factor", "1",
      "--partitions", "3"]

  # different application running

  primary-backend:
    build:
      context: ./primary-backend
      dockerfile: Dockerfile
    container_name: zap-primary-backend
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      # postgres default db is "postgres" — no custom db needed
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      JWT_PASSWORD: dev-jwt-secret-do-not-use-in-prod
      PORT: 3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  hooks:
    build:
      context: ./hooks
      dockerfile: Dockerfile
    container_name: zap-hooks
    depends_on:
      primary-backend:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      JWT_PASSWORD: dev-jwt-secret-do-not-use-in-prod
      PORT: 3002
    ports:
      - "3002:3002"

  processor:
    build:
      context: ./processor
      dockerfile: Dockerfile
    container_name: zap-processor
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      KAFKA_BROKER: kafka:9092
    restart: unless-stopped

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: zap-worker
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      KAFKA_BROKER: kafka:9092
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zap-frontend
    depends_on:
      primary-backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3001:3001"